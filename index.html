<style>
  :root {
    --bg: #fafafa;
    --ink: #0a0a0a;
    --muted: #8a8a8a;
    --line: #ececec;
    --tile: #ffffff;
    --tile-soft: #f3f3f3;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: "Fredoka", system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; border: none; background: none; cursor: pointer; }

  /* clock */
  .clock {
    position: fixed;
    top: 28px; right: 36px;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 18px;
    letter-spacing: 0.08em;
    color: var(--ink);
    z-index: 60;
    font-variant-numeric: tabular-nums;
  }

  /* shell */
  .layout {
    display: grid;
    grid-template-columns: 88px 1fr;
    max-width: 920px;
    margin: 0 auto;
    padding: 88px 24px 200px;
    gap: 96px;
    align-items: start;
  }
  main {
    min-width: 0;
  }

  /* tabs - vertical */
  .tabs {
    position: sticky;
    top: 88px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .tab {
    width: 56px;
    height: 56px;
    border-radius: 14px;
    background: var(--tile);
    display: grid;
    place-items: center;
    color: var(--muted);
    transition: background .2s ease, color .2s ease, transform .2s ease, box-shadow .2s ease;
    position: relative;
    box-shadow: 0 1px 0 rgba(0,0,0,.02);
  }
  .tab:hover { color: var(--ink); transform: translateX(2px); }
  .tab.active {
    background: var(--ink);
    color: #fff;
    box-shadow: 0 8px 24px -10px rgba(0,0,0,.4);
  }
  .tab svg { width: 20px; height: 20px; }
  .tab .lbl {
    position: absolute;
    left: 68px;
    top: 50%;
    transform: translateY(-50%);
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 9.5px;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    opacity: 0;
    transition: opacity .2s ease;
    white-space: nowrap;
    pointer-events: none;
  }
  .tab.active .lbl { opacity: 1; color: var(--ink); }

  /* panel */
  .panel { display: none; animation: fadeUp .45s cubic-bezier(.2,.7,.2,1); }
  .panel.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: none; }
  }

  /* projects focus mode */
  #panel-projects .row {
    transition: padding .25s ease, filter .35s ease, opacity .35s ease, transform .35s ease;
  }
  #panel-projects.focusing .row {
    filter: blur(1.2px);
    opacity: .65;
  }
  #panel-projects.focusing .row.focused {
    filter: none;
    opacity: 1;
    transform: scale(1.015);
  }

  /* row */
  .row {
    display: grid;
    grid-template-columns: 44px 1fr 18px;
    gap: 18px;
    align-items: center;
    padding: 18px 6px;
    border-bottom: 1px solid var(--line);
    transition: padding .25s ease;
  }
  .row.click { cursor: pointer; }
  .row.click:hover { padding-left: 16px; }
  .row .ico {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--tile);
    display: grid; place-items: center;
    color: var(--muted);
  }
  .row .ico svg { width: 16px; height: 16px; }
  .row .body .t {
    font-size: 15px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.2;
  }
  .row .body .s {
    font-size: 12.5px;
    color: var(--muted);
    margin-top: 3px;
    line-height: 1.4;
  }
  .row .chev {
    color: var(--muted);
    transition: transform .25s ease, color .25s ease;
  }
  .row.click:hover .chev { color: var(--ink); transform: translateX(3px); }
  .row .chev svg { width: 14px; height: 14px; }

  /* about hero row */
  .me {
    display: grid;
    grid-template-columns: 44px 1fr 18px;
    gap: 18px;
    align-items: center;
    padding: 18px 6px;
    border-bottom: 1px solid var(--line);
  }
  .me .av {
    width: 36px; height: 36px;
    border-radius: 10px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .me .av img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 20%;
    display: block;
  }
  .me .t { font-size: 15px; font-weight: 500; }
  .me .s { font-size: 12.5px; color: var(--muted); margin-top: 3px; }

  /* about overview */
  .overview {
    padding: 22px 6px 8px;
    font-size: 14.5px;
    line-height: 1.55;
    color: #2a2a2a;
    max-width: 56ch;
  }


  /* github heatmap */
  .heatmap-wrap {
    margin-top: 20px;
    overflow-x: auto;
  }
  .heatmap-label {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 9.5px;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  #heatmap { display: flex; gap: 2px; }

  /* footer hint */
  .hint {
    position: fixed;
    bottom: 28px; left: 0; right: 0;
    display: flex;
    justify-content: center;
    gap: 28px;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 10.5px;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    pointer-events: none;
  }
  .hint .grp { display: inline-flex; align-items: center; gap: 8px; }
  .hint .key {
    border: 1px solid var(--line);
    padding: 3px 7px;
    border-radius: 5px;
    background: #fff;
    color: var(--ink);
    font-size: 10px;
  }

  /* modal */
  .scrim {
    position: fixed; inset: 0;
    background: rgba(10,10,10,0);
    backdrop-filter: blur(0px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    transition: background .3s ease, backdrop-filter .3s ease;
  }
  .scrim.open {
    display: flex;
    background: rgba(10,10,10,0.45);
    backdrop-filter: blur(6px);
  }
  .modal {
    width: min(640px, calc(100vw - 48px));
    max-height: calc(100vh - 64px);
    background: #fff;
    border-radius: 16px;
    overflow: auto;
    transform: translateY(16px) scale(.985);
    opacity: 0;
    transition: transform .35s cubic-bezier(.2,.7,.2,1), opacity .25s ease;
    padding: 32px 36px 36px;
  }
  .scrim.open .modal { transform: none; opacity: 1; }
  .modal .head {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 16px;
    margin-bottom: 18px;
  }
  .modal h3 {
    font-size: 22px;
    font-weight: 500;
    margin: 0;
    letter-spacing: -0.01em;
  }
  .modal .meta {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 10.5px;
    letter-spacing: 0.16em;
    color: var(--muted);
    text-transform: uppercase;
    margin-top: 6px;
  }
  .modal .x {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--tile-soft);
    display: grid; place-items: center;
    color: var(--muted);
    transition: background .2s ease, color .2s ease;
  }
  .modal .x:hover { background: var(--ink); color: #fff; }
  .modal .x svg { width: 12px; height: 12px; }
  .modal p {
    font-size: 14.5px;
    line-height: 1.6;
    color: #2a2a2a;
    margin: 0 0 12px;
  }
  .modal .kv {
    margin-top: 18px;
    border-top: 1px solid var(--line);
  }
  .modal .kv .r {
    display: grid;
    grid-template-columns: 90px 1fr;
    gap: 16px;
    padding: 10px 0;
    border-bottom: 1px solid var(--line);
    font-size: 13.5px;
  }
  .modal .kv .k {
    color: var(--muted);
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 10.5px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding-top: 2px;
  }

  @media (max-width: 600px) {
    .clock { top: 16px; right: 18px; font-size: 14px; }
    .layout {
      grid-template-columns: 1fr;
      padding: 64px 18px 160px;
      gap: 28px;
    }
    .tabs {
      position: static;
      flex-direction: row;
      justify-content: center;
    }
    .tab .lbl { display: none; }
    .hint { gap: 14px; font-size: 9.5px; }
  }
</style>

  const EXPERIENCES = [
    {

      org: "Ultra Maritime",
      meta: "Summer 2026",
      summary: "",
      icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>`

  // render experiences
  const explist = document.getElementById('explist');
  EXPERIENCES.forEach(e => {
    const row = document.createElement('div');
    row.className = 'row click';
    row.dataset.id = e.id;
    row.innerHTML = `
      <div class="ico">${e.icon}</div>
      <div class="body"><div class="t">${e.title} · ${e.org}</div><div class="s">${e.meta}</div></div>
      <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg></span>

    row.addEventListener('click', () => openModal(e.id));
    explist.appendChild(row);
  });

  // render projects
  const list = document.getElementById('projlist');
  const projPanel = document.getElementById('panel-projects');
  PROJECTS.forEach(p => {
    const row = document.createElement('div');
    row.className = 'row click';
    row.dataset.id = p.id;
    row.innerHTML = `
      <div class="ico">${p.image ? `<img src="${p.image}" alt="${p.title}" style="width:28px;height:28px;object-fit:cover;border-radius:6px;">` : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>`}</div>

      <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg></span>
    `;
    row.addEventListener('click', () => openModal(p.id));
    list.appendChild(row);
  });

  // wheel-driven project focus: each notch advances one row
  const projRows = () => [...list.querySelectorAll('.row')];
  let focusedIdx = 0;
  function applyFocus() {
    const rows = projRows();
    rows.forEach((r, i) => r.classList.toggle('focused', i === focusedIdx));
    projPanel.classList.add('focusing');
    const target = rows[focusedIdx];
    if (target) {
      const rect = target.getBoundingClientRect();
      const mid = rect.top + rect.height / 2;
      const delta = mid - window.innerHeight / 2;
      if (Math.abs(delta) > 4) {
        window.scrollBy({ top: delta, behavior: 'smooth' });
      }
    }
  }
  let wheelLock = false;
  function onWheel(e) {
    if (!projPanel.classList.contains('active')) return;
    e.preventDefault();
    if (wheelLock) return;
    if (Math.abs(e.deltaY) < 4) return;
    const rows = projRows();
    const dir = e.deltaY > 0 ? 1 : -1;
    focusedIdx = Math.max(0, Math.min(rows.length - 1, focusedIdx + dir));
    applyFocus();
    wheelLock = true;
    setTimeout(() => { wheelLock = false; }, 380);
  }
  window.addEventListener('wheel', onWheel, { passive: false });
  // touch / keyboard fallback
  document.addEventListener('keydown', (e) => {
    if (!projPanel.classList.contains('active')) return;
    if (scrim.classList.contains('open')) return;
    if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
      const rows = projRows();
      const dir = e.key === 'ArrowDown' ? 1 : -1;
      const next = focusedIdx + dir;
      if (next < 0 || next >= rows.length) return; // let tab nav handle edges
      e.preventDefault();
      focusedIdx = next;
      applyFocus();
    } else if (e.key === 'Enter') {
      const rows = projRows();
      if (rows[focusedIdx]) rows[focusedIdx].click();
    }
  }, true);
  // hover overrides focus
  list.addEventListener('mouseover', (e) => {
    const r = e.target.closest('.row');
    if (!r) return;
    const rows = projRows();
    focusedIdx = rows.indexOf(r);
    rows.forEach((x, i) => x.classList.toggle('focused', i === focusedIdx));
    projPanel.classList.add('focusing');
  });

  // tabs
  const tabs = [...document.querySelectorAll('.tab')];
  const panels = [...document.querySelectorAll('.panel')];
  function activate(name) {
    tabs.forEach(t => t.classList.toggle('active', t.dataset.panel === name));
    panels.forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
    if (name === 'projects') {
      focusedIdx = 0;
      requestAnimationFrame(applyFocus);
    } else projPanel.classList.remove('focusing');
  }
  tabs.forEach(t => t.addEventListener('click', () => activate(t.dataset.panel)));

  // arrow-key tabs
  document.addEventListener('keydown', (e) => {
    if (scrim.classList.contains('open')) return;
    if (['ArrowLeft','ArrowRight','ArrowUp','ArrowDown'].includes(e.key)) {
      const fwd = e.key === 'ArrowRight' || e.key === 'ArrowDown';
      const idx = tabs.findIndex(t => t.classList.contains('active'));
      const next = (idx + (fwd ? 1 : -1) + tabs.length) % tabs.length;
      activate(tabs[next].dataset.panel);
    }
  });

  // modal
  const scrim = document.getElementById('scrim');
  function openModal(id) {
    const p = PROJECTS.find(x => x.id === id) || EXPERIENCES.find(x => x.id === id);
    document.getElementById('m-title').textContent = p.org ? `${p.title} · ${p.org}` : p.title;
    document.getElementById('m-meta').textContent = p.meta;
    const imgEl = document.getElementById('m-img');
    if (p.image) {
      imgEl.src = p.image;
      imgEl.style.display = 'block';
    } else {
      imgEl.style.display = 'none';
    }
    const summaryEl = document.getElementById('m-summary');
    if (p.url) {
      summaryEl.innerHTML = `<a href="${p.url}" target="_blank" rel="noopener" style="color:var(--ink);text-decoration:underline;text-underline-offset:3px;">${p.summary}</a>`;
    } else {
      summaryEl.textContent = p.summary || 'No description yet.';
    }
    const kv = document.getElementById('m-kv');
    kv.innerHTML = '';
    if (p.github) {
      kv.innerHTML = `<div class="r"><div class="k">GitHub</div><div><a href="${p.github}" target="_blank" rel="noopener" style="color:var(--ink);text-decoration:underline;text-underline-offset:3px;">${p.github.replace('https://', '')}</a></div></div>`;
    }
    scrim.classList.add('open');
  }
  function closeModal() { scrim.classList.remove('open'); }
  document.getElementById('m-close').addEventListener('click', closeModal);
  scrim.addEventListener('click', (e) => { if (e.target === scrim) closeModal(); });
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeModal(); });

  // github heatmap
  (async () => {
    const el = document.getElementById('heatmap');
    try {
      const res = await fetch('https://github-contributions-api.jogruber.de/v4/DaxManuel27?y=last');
      let { contributions } = await res.json();

      // keep only last 4 months
      const cutoff = new Date();
      cutoff.setMonth(cutoff.getMonth() - 4);
      contributions = contributions.filter(d => new Date(d.date) >= cutoff);

      // pad start so grid begins on Sunday
      const firstDow = new Date(contributions[0].date).getDay();
      const cells = [...Array(firstDow).fill(null), ...contributions];

      // build week columns
      const weeks = [];
      for (let i = 0; i < cells.length; i += 7) weeks.push(cells.slice(i, i + 7));

      const colors = ['#e8e8e8', '#c0c0c0', '#888888', '#484848', '#0f0f0f'];

      weeks.forEach(week => {
        const col = document.createElement('div');
        col.style.cssText = 'display:flex;flex-direction:column;gap:2px;';
        while (week.length < 7) week.push(null);
        week.forEach(day => {
          const cell = document.createElement('div');
          cell.style.cssText = `width:10px;height:10px;border-radius:2px;background:${colors[day ? day.level : 0]};flex-shrink:0;`;
          if (day && day.count > 0) cell.title = `${day.date}: ${day.count} contribution${day.count !== 1 ? 's' : ''}`;
          col.appendChild(cell);
        });
        el.appendChild(col);
      });
    } catch(e) {
      document.querySelector('.heatmap-wrap').style.display = 'none';
    }
  })();

</script>

</body>
</html>
