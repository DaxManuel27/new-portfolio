<style>
  :root {
    --bg: #fafafa;
    --ink: #0a0a0a;
    --muted: #8a8a8a;
    --line: #ececec;
    --tile: #ffffff;
    --tile-soft: #f3f3f3;
    --nav-h: 60px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body {
    font-family: "Fredoka", system-ui, sans-serif;
    color: var(--ink);
    background: var(--bg);
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; border: none; background: none; cursor: pointer; padding: 0; }

  /* ── Navbar ── */
  .navbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 50;
    height: var(--nav-h);
    background: rgba(250, 250, 250, 0.82);
    backdrop-filter: saturate(180%) blur(20px);
    -webkit-backdrop-filter: saturate(180%) blur(20px);
    border-bottom: 1px solid var(--line);
  }
  .nav-inner {
    width: 50%;
    margin: 0 auto;
    height: 100%;
    display: flex;
    align-items: stretch;
    justify-content: space-around;
  }
  .nav-tab {
    position: relative;
    display: flex;
    align-items: center;
    font-size: 15.5px;
    font-weight: 400;
    color: var(--muted);
    padding: 0 8px;
    transition: color .18s ease;
    white-space: nowrap;
    letter-spacing: 0.01em;
  }
  .nav-tab::after {
    content: '';
    position: absolute;
    bottom: -1px;
    left: 0; right: 0;
    height: 1.5px;
    background: var(--ink);
    opacity: 0;
    transition: opacity .18s ease;
  }
  .nav-tab:hover { color: var(--ink); }
  .nav-tab.active { color: var(--ink); font-weight: 500; }
  .nav-tab.active::after { opacity: 1; }

  /* ── Content ── */
  .content {
    max-width: 900px;
    margin: 0 auto;
    padding: calc(var(--nav-h) + 52px) 32px 120px;
  }

  /* ── Panel ── */
  .panel { display: none; animation: fadeUp .4s cubic-bezier(.2,.7,.2,1); }
  .panel.active { display: block; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: none; }
  }

  /* ── Profile / About ── */
  .hero {
    display: flex;
    align-items: center;
    gap: 20px;
    padding-bottom: 28px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 28px;
  }
  .hero .av {
    width: 56px; height: 56px;
    border-radius: 14px;
    overflow: hidden;
    flex-shrink: 0;
  }
  .hero .av img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 20%;
    display: block;
  }
  .hero .name { font-size: 20px; font-weight: 500; line-height: 1.2; }
  .hero .sub {
    font-size: 13.5px;
    color: var(--muted);
    margin-top: 3px;
    font-family: "JetBrains Mono", ui-monospace, monospace;
    letter-spacing: 0.04em;
  }
  .overview {
    font-size: 15px;
    line-height: 1.6;
    color: #2a2a2a;
    max-width: 60ch;
    margin-bottom: 36px;
  }

  /* ── GitHub heatmap ── */
  .heatmap-label {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 9.5px;
    letter-spacing: 0.18em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .heatmap-wrap { overflow-x: auto; }
  #heatmap { display: flex; gap: 2px; }

  /* ── Project grid ── */
  .proj-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px;
  }
  .proj-card {
    aspect-ratio: 1 / 1;
    background: var(--tile);
    border: 1px solid var(--line);
    border-radius: 18px;
    overflow: hidden;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    transition: transform .22s cubic-bezier(.2,.7,.2,1), box-shadow .22s ease;
    position: relative;
  }
  .proj-card:hover {
    transform: translateY(-3px);
    box-shadow: 0 12px 32px -10px rgba(0,0,0,0.18);
  }
  .proj-card .card-img {
    flex: 1;
    background: var(--tile-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    position: relative;
  }
  .proj-card .card-img img {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }
  .proj-card .card-img .placeholder-icon {
    color: #d8d8d8;
  }
  .proj-card .card-img .placeholder-icon svg {
    width: 36px; height: 36px;
  }
  .proj-card .card-body {
    flex-shrink: 0;
    padding: 13px 15px 14px;
    border-top: 1px solid var(--line);
  }
  .proj-card .card-title {
    font-size: 13.5px;
    font-weight: 500;
    color: var(--ink);
    line-height: 1.3;
  }
  .proj-card .card-meta {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 0.06em;
    margin-top: 3px;
  }

  /* ── Experience & Contact rows ── */
  .row {
    display: grid;
    grid-template-columns: 44px 1fr 18px;
    gap: 18px;
    align-items: center;
    padding: 18px 6px;
    border-bottom: 1px solid var(--line);
    transition: padding .22s ease;
  }
  .row.click { cursor: pointer; }
  .row.click:hover { padding-left: 16px; }
  .row .ico {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: var(--tile);
    border: 1px solid var(--line);
    display: grid; place-items: center;
    color: var(--muted);
    flex-shrink: 0;
  }
  .row .ico svg { width: 16px; height: 16px; }
  .row .body .t { font-size: 15px; font-weight: 500; line-height: 1.2; }
  .row .body .s { font-size: 12.5px; color: var(--muted); margin-top: 3px; line-height: 1.4; }
  .row .chev { color: var(--muted); transition: transform .22s ease, color .22s ease; }
  .row.click:hover .chev { color: var(--ink); transform: translateX(3px); }
  .row .chev svg { width: 14px; height: 14px; }

  /* ── Modal ── */
  .scrim {
    position: fixed; inset: 0;
    background: rgba(10,10,10,0);
    backdrop-filter: blur(0px);
    z-index: 100;
    display: none;
    align-items: center;
    justify-content: center;
    transition: background .3s ease, backdrop-filter .3s ease;
  }
  .scrim.open {
    display: flex;
    background: rgba(10,10,10,0.45);
    backdrop-filter: blur(6px);
  }
  .modal {
    width: min(640px, calc(100vw - 48px));
    max-height: calc(100vh - 64px);
    background: #fff;
    border-radius: 18px;
    overflow: auto;
    transform: translateY(14px) scale(.987);
    opacity: 0;
    transition: transform .32s cubic-bezier(.2,.7,.2,1), opacity .22s ease;
    padding: 32px 36px 36px;
  }
  .scrim.open .modal { transform: none; opacity: 1; }
  .modal .head {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 16px; margin-bottom: 18px;
  }
  .modal h3 { font-size: 22px; font-weight: 500; margin: 0; letter-spacing: -0.01em; }
  .modal .meta {
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 10.5px; letter-spacing: 0.16em;
    color: var(--muted); text-transform: uppercase; margin-top: 6px;
  }
  .modal .x {
    width: 30px; height: 30px;
    border-radius: 8px; background: var(--tile-soft);
    display: grid; place-items: center;
    color: var(--muted);
    transition: background .2s ease, color .2s ease;
    flex-shrink: 0;
  }
  .modal .x:hover { background: var(--ink); color: #fff; }
  .modal .x svg { width: 12px; height: 12px; }
  .modal p { font-size: 14.5px; line-height: 1.6; color: #2a2a2a; margin: 0 0 12px; }
  .modal .kv { margin-top: 18px; border-top: 1px solid var(--line); }
  .modal .kv .r {
    display: grid; grid-template-columns: 90px 1fr;
    gap: 16px; padding: 10px 0;
    border-bottom: 1px solid var(--line); font-size: 13.5px;
  }
  .modal .kv .k {
    color: var(--muted);
    font-family: "JetBrains Mono", ui-monospace, monospace;
    font-size: 10.5px; letter-spacing: 0.14em; text-transform: uppercase; padding-top: 2px;
  }

  /* ── Responsive ── */
  @media (max-width: 700px) {
    .nav-inner { width: 100%; padding: 0 16px; }
    .content { padding: calc(var(--nav-h) + 36px) 20px 100px; }
    .proj-grid { grid-template-columns: repeat(2, 1fr); }
  }
  @media (max-width: 480px) {
    .proj-grid { grid-template-columns: 1fr 1fr; gap: 10px; }
  }
</style>
</head>

<script data-cfasync="false" src="/cdn-cgi/scripts/5c5dd728/cloudflare-static/email-decode.min.js"></script><script>
  const PROJECTS = [

  const EXPERIENCES = [
    {
      id: "ultra-maritime",

      org: "Ultra Maritime",
      meta: "Summer 2026",
      summary: "",
      icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12s4-7 10-7 10 7 10 7-4 7-10 7S2 12 2 12Z"/><circle cx="12" cy="12" r="3"/></svg>`
    },
    {
      id: "unb-formula",
      title: "Electrical Project Lead",
      org: "UNB Formula Racing",
      meta: "Sep 2025 — Present",
      summary: "",
      icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 11h14l-2 7H7z"/><circle cx="8" cy="20" r="1.5"/><circle cx="16" cy="20" r="1.5"/><path d="M5 11 7 5h10l2 6"/></svg>`
    },
    {
      id: "hack-atlantic",
      title: "Founder",
      org: "Hack Atlantic",
      meta: "Apr 2026 — Present",
      summary: "hackatlantic.ca",
      url: "https://hackatlantic.ca",
      icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2 2 7l10 5 10-5-10-5Z"/><path d="m2 17 10 5 10-5"/><path d="m2 12 10 5 10-5"/></svg>`
    }
  ];

  // render experiences
  const explist = document.getElementById('explist');
  EXPERIENCES.forEach(e => {
    const row = document.createElement('div');
    row.className = 'row click';
    row.dataset.id = e.id;
    row.innerHTML = `
      <div class="ico">${e.icon}</div>
      <div class="body"><div class="t">${e.title} · ${e.org}</div><div class="s">${e.meta}</div></div>
      <span class="chev"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 6 6 6-6 6"/></svg></span>
    `;
    row.addEventListener('click', () => openModal(e.id));
    explist.appendChild(row);
  });

  // render project cards
  const grid = document.getElementById('projlist');
  const placeholderSVG = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><path d="M3 9h18M9 21V9"/></svg>`;
  PROJECTS.forEach(p => {
    const card = document.createElement('div');
    card.className = 'proj-card';
    card.dataset.id = p.id;
    card.innerHTML = `
      <div class="card-img">
        ${p.image
          ? `<img src="${p.image}" alt="${p.title}">`
          : `<div class="placeholder-icon">${placeholderSVG}</div>`}

      <div class="card-body">

        <div class="card-meta">${p.meta}</div>

    `;
    card.addEventListener('click', () => openModal(p.id));
    grid.appendChild(card);
  });

  // tab navigation
  const tabs = [...document.querySelectorAll('.nav-tab')];
  const panels = [...document.querySelectorAll('.panel')];
  function activate(name) {
    tabs.forEach(t => t.classList.toggle('active', t.dataset.panel === name));
    panels.forEach(p => p.classList.toggle('active', p.id === 'panel-' + name));
  }
  tabs.forEach(t => t.addEventListener('click', () => activate(t.dataset.panel)));

  // modal
  const scrim = document.getElementById('scrim');
  function openModal(id) {
    const p = PROJECTS.find(x => x.id === id) || EXPERIENCES.find(x => x.id === id);
    document.getElementById('m-title').textContent = p.org ? `${p.title} · ${p.org}` : p.title;
    document.getElementById('m-meta').textContent = p.meta;
    const imgEl = document.getElementById('m-img');
    if (p.image) { imgEl.src = p.image; imgEl.style.display = 'block'; }
    else { imgEl.style.display = 'none'; }
    const summaryEl = document.getElementById('m-summary');
    if (p.url) {
      summaryEl.innerHTML = `<a href="${p.url}" target="_blank" rel="noopener" style="color:var(--ink);text-decoration:underline;text-underline-offset:3px;">${p.summary}</a>`;
    } else {
      summaryEl.textContent = p.summary || 'No description yet.';
    }
    const kv = document.getElementById('m-kv');
    kv.innerHTML = '';
    if (p.github) {
      kv.innerHTML = `<div class="r"><div class="k">GitHub</div><div><a href="${p.github}" target="_blank" rel="noopener" style="color:var(--ink);text-decoration:underline;text-underline-offset:3px;">${p.github.replace('https://', '')}</a></div></div>`;
    }
    scrim.classList.add('open');
  }
  function closeModal() { scrim.classList.remove('open'); }
  document.getElementById('m-close').addEventListener('click', closeModal);
  scrim.addEventListener('click', e => { if (e.target === scrim) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  // GitHub heatmap
  (async () => {
    const el = document.getElementById('heatmap');
    try {
      const res = await fetch('https://github-contributions-api.jogruber.de/v4/DaxManuel27?y=last');
      let { contributions } = await res.json();
      const cutoff = new Date();
      cutoff.setMonth(cutoff.getMonth() - 4);
      contributions = contributions.filter(d => new Date(d.date) >= cutoff);
      const firstDow = new Date(contributions[0].date).getDay();
      const cells = [...Array(firstDow).fill(null), ...contributions];
      const weeks = [];
      for (let i = 0; i < cells.length; i += 7) weeks.push(cells.slice(i, i + 7));
      const colors = ['#e8e8e8', '#c0c0c0', '#888888', '#484848', '#0f0f0f'];
      weeks.forEach(week => {
        const col = document.createElement('div');
        col.style.cssText = 'display:flex;flex-direction:column;gap:2px;';
        while (week.length < 7) week.push(null);
        week.forEach(day => {
          const cell = document.createElement('div');
          cell.style.cssText = `width:10px;height:10px;border-radius:2px;background:${colors[day ? day.level : 0]};flex-shrink:0;`;
          if (day && day.count > 0) cell.title = `${day.date}: ${day.count} contribution${day.count !== 1 ? 's' : ''}`;
          col.appendChild(cell);
        });
        el.appendChild(col);
      });
    } catch(e) {
      document.querySelector('.heatmap-wrap').style.display = 'none';
    }
  })();
</script>

</body>
</html>
